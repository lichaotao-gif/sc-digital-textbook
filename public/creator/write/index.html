<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../creator.css">
  <link rel="stylesheet" href="./write.css">

<body>
  <!-- 统一图标 sprite：笔画 2、圆角端点，与 .cr-w-svg 配色 -->

      <symbol id="cr-ic-trash" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14zM10 11v6M14 11v6"/></symbol>
      <symbol id="cr-ic-sparkles" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 3v3M12 18v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M3 12h3M18 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/><circle fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="3.5"/></symbol>

      <symbol id="cr-ic-send" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></symbol>
      <symbol id="cr-ic-undo" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 7v6h6"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></symbol>

      <symbol id="cr-ic-type" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 20h16"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 4v12"/></symbol>
      <symbol id="cr-ic-search" viewBox="0 0 24 24"><circle fill="none" stroke="currentColor" stroke-width="2" cx="11" cy="11" r="8"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="m21 21-4.35-4.35"/></symbol>
      <symbol id="cr-ic-sigma" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 9h16M4 15h16M10 3L8 21M16 3l-2 18"/></symbol>
      <symbol id="cr-ic-code" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></symbol>
      <symbol id="cr-ic-message" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></symbol>
      <symbol id="cr-ic-image" viewBox="0 0 24 24"><rect fill="none" stroke="currentColor" stroke-width="2" x="3" y="3" width="18" height="18" rx="2"/><circle fill="none" stroke="currentColor" stroke-width="2" cx="8.5" cy="8.5" r="1.5"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M21 15l-5-5L5 21"/></symbol>
      <symbol id="cr-ic-video" viewBox="0 0 24 24"><rect fill="none" stroke="currentColor" stroke-width="2" x="2" y="5" width="15" height="14" rx="2"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M23 9l-5 3v6l5 3V9z"/></symbol>
      <symbol id="cr-ic-audio" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M9 18V5l12-2v13"/><circle fill="none" stroke="currentColor" stroke-width="2" cx="6" cy="18" r="3"/><circle fill="none" stroke="currentColor" stroke-width="2" cx="18" cy="16" r="3"/></symbol>
      <symbol id="cr-ic-layers" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 2L2 7l10 5 10-5-10-5z"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M2 17l10 5 10-5M2 12l10 5 10-5"/></symbol>
      <symbol id="cr-ic-clapper" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 11V4a2 2 0 0 1 2-2h3l3 4h4a2 2 0 0 1 2 2v1"/><rect fill="none" stroke="currentColor" stroke-width="2" x="4" y="11" width="16" height="11" rx="2"/></symbol>
      <symbol id="cr-ic-paperclip" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></symbol>
      <symbol id="cr-ic-help" viewBox="0 0 24 24"><circle fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="10"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 17h.01"/></symbol>
      <symbol id="cr-ic-globe" viewBox="0 0 24 24"><circle fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="10"/><path fill="none" stroke="currentColor" stroke-width="2" d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></symbol>
      <symbol id="cr-ic-wrench" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></symbol>
      <symbol id="cr-ic-square" viewBox="0 0 24 24"><rect fill="none" stroke="currentColor" stroke-width="2" x="3" y="3" width="18" height="18" rx="2"/></symbol>

      <symbol id="cr-ic-book" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></symbol>

      <symbol id="cr-ic-dots-v" viewBox="0 0 24 24"><circle cx="12" cy="6" r="1.75" fill="currentColor"/><circle cx="12" cy="12" r="1.75" fill="currentColor"/><circle cx="12" cy="18" r="1.75" fill="currentColor"/></symbol>

  </svg>

  <div class="app cr-write-app">
    <div class="cr-write-shell">
      <header class="cr-write-head">
        <a class="cr-write-head-back" href="../index.html">
          <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-chevron-left"/></svg>
          返回
        </a>
        <h1 class="cr-write-head-title" id="writePageTitle">撰写图书</h1>
        <div class="cr-write-head-actions">
          <button type="button" class="cr-write-ai" id="writeAiBtn" title="AI 助手（演示）">
            <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-sparkles"/></svg>
            AI 助手
          </button>
          <button type="button" class="cr-write-btn cr-write-btn--ghost" title="预览">
            <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-eye"/></svg>
            预览
          </button>
          <button type="button" class="cr-write-btn cr-write-btn--ghost" title="保存">
            <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-save"/></svg>
            保存
          </button>
          <button type="button" class="cr-write-btn cr-write-btn--primary" title="提交审核">
            <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-send"/></svg>
            提交审核
          </button>
        </div>
      </header>

      <div class="cr-write-body">
        <aside class="cr-write-toc" aria-label="目录">
          <div class="cr-write-toc-head">
            <span style="display:inline-flex;align-items:center;gap:6px">
              <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-list"/></svg>
              目录
            </span>
            <a href="#" class="cr-write-toc-head-link" id="writeNewChapter" onclick="return false;">+ 新建章节/任务</a>
          </div>
          <p class="cr-write-toc-hint">目录最多 <strong>三级</strong>（章 → 节 → 要点）；三级节点不可再添加子项。</p>
          <div class="cr-write-toc-scroll">
            <div class="cr-write-tree-group">
              <div class="cr-write-tree-row cr-write-tree-row--l1 is-active">
                <button type="button" class="cr-write-tree-chev" aria-label="折叠章节"><svg class="cr-w-svg"><use href="#cr-ic-chevron-down"/></svg></button>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label">第一章 内容</span>
                  <div class="cr-write-tree-badges">
                    <span class="cr-write-tag cr-write-tag--train">实训</span>
                  </div>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-plus"/></svg>添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
              <div class="cr-write-tree-row cr-write-tree-row--l2">
                <span class="cr-write-tree-gutter" aria-hidden="true"></span>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label">1.1 节概述</span>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-plus"/></svg>添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
              <div class="cr-write-tree-row cr-write-tree-row--l2">
                <span class="cr-write-tree-gutter" aria-hidden="true"></span>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label">1.2 核心概念</span>
                  <div class="cr-write-tree-badges">
                    <span class="cr-write-tag cr-write-tag--case">案例</span>
                  </div>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-plus"/></svg>添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
              <div class="cr-write-tree-row cr-write-tree-row--l3">
                <span class="cr-write-tree-gutter" aria-hidden="true"></span>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label cr-write-tree-label--l3">· 知识点 A（三级）</span>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" disabled title="目录最多三级，无法继续添加子项">添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
              <div class="cr-write-tree-row cr-write-tree-row--l3">
                <span class="cr-write-tree-gutter" aria-hidden="true"></span>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label cr-write-tree-label--l3">· 知识点 B（三级）</span>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" disabled title="目录最多三级，无法继续添加子项">添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
              <div class="cr-write-tree-row cr-write-tree-row--l2">
                <span class="cr-write-tree-gutter" aria-hidden="true"></span>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label">小结作业</span>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-plus"/></svg>添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
            </div>
            <div class="cr-write-tree-group">
              <div class="cr-write-tree-row cr-write-tree-row--l1">
                <button type="button" class="cr-write-tree-chev" aria-label="展开章节"><svg class="cr-w-svg"><use href="#cr-ic-chevron-right"/></svg></button>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label">第二章 实操练习</span>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-plus"/></svg>添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
            </div>
            <div class="cr-write-tree-group">
              <div class="cr-write-tree-row cr-write-tree-row--l1">
                <button type="button" class="cr-write-tree-chev" aria-label="展开章节"><svg class="cr-w-svg"><use href="#cr-ic-chevron-right"/></svg></button>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label">防风服</span>
                  <div class="cr-write-tree-badges">
                    <span class="cr-write-tag cr-write-tag--case">案例</span>
                  </div>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-plus"/></svg>添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
            </div>
            <div class="cr-write-tree-group">
              <div class="cr-write-tree-row cr-write-tree-row--l1">
                <button type="button" class="cr-write-tree-chev" aria-label="展开章节"><svg class="cr-w-svg"><use href="#cr-ic-chevron-right"/></svg></button>
                <div class="cr-write-tree-main">
                  <span class="cr-write-tree-label">狂人日记</span>
                </div>
                <details class="cr-write-row-menu">
                  <summary class="cr-write-row-more" aria-label="章节操作" onclick="event.stopPropagation()">
                    <svg class="cr-w-svg" aria-hidden="true"><use href="#cr-ic-dots-v"/></svg>
                  </summary>
                  <div class="cr-write-row-pop" role="menu">
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-plus"/></svg>添加子项</button>
                    <button type="button" class="cr-write-menu-item" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-pencil"/></svg>编辑</button>
                    <button type="button" class="cr-write-menu-item cr-write-menu-item--danger" role="menuitem"><svg class="cr-w-menu-ic" aria-hidden="true"><use href="#cr-ic-trash"/></svg>删除</button>
                  </div>
                </details>
              </div>
            </div>
          </div>
        </aside>

        <section class="cr-write-editor-wrap" aria-label="正文编辑">
          <div class="cr-write-toolbars">
            <div class="cr-write-tool-row">
              <select class="cr-write-tool-select" title="段落样式" aria-label="段落样式">
                <option>段落</option>
                <option>标题 1</option>
                <option>标题 2</option>
              </select>
              <select class="cr-write-tool-select" title="字号" aria-label="字号">
                <option>字号</option>
                <option>12</option>
                <option>14</option>
                <option>16</option>
              </select>
              <select class="cr-write-tool-select" title="字体" aria-label="字体">
                <option>字体</option>
                <option>思源黑体</option>
                <option>宋体</option>
              </select>
              <span class="cr-write-tool-split"></span>
              <button type="button" class="cr-write-tool-btn" title="撤销"><svg class="cr-w-svg"><use href="#cr-ic-undo"/></svg></button>
              <button type="button" class="cr-write-tool-btn" title="重做"><svg class="cr-w-svg"><use href="#cr-ic-redo"/></svg></button>
              <span class="cr-write-tool-split"></span>
              <button type="button" class="cr-write-tool-btn" title="行距"><svg class="cr-w-svg"><use href="#cr-ic-type"/></svg></button>
              <button type="button" class="cr-write-tool-btn" title="对齐"><svg class="cr-w-svg"><use href="#cr-ic-align-left"/></svg></button>
              <span class="cr-write-tool-split"></span>
              <button type="button" class="cr-write-tool-btn" title="表格"><svg class="cr-w-svg"><use href="#cr-ic-table"/></svg></button>
              <button type="button" class="cr-write-tool-btn" title="查找"><svg class="cr-w-svg"><use href="#cr-ic-search"/></svg></button>
              <button type="button" class="cr-write-tool-btn" title="公式"><svg class="cr-w-svg"><use href="#cr-ic-sigma"/></svg></button>
            </div>
            <div class="cr-write-tool-row">
              <button type="button" class="cr-write-tool-btn" title="代码块"><svg class="cr-w-svg"><use href="#cr-ic-code"/></svg>代码块</button>
              <button type="button" class="cr-write-tool-btn" title="气泡"><svg class="cr-w-svg"><use href="#cr-ic-message"/></svg>气泡</button>
              <button type="button" class="cr-write-tool-btn" title="图片"><svg class="cr-w-svg"><use href="#cr-ic-image"/></svg>图片</button>
              <button type="button" class="cr-write-tool-btn" title="视频"><svg class="cr-w-svg"><use href="#cr-ic-video"/></svg>视频</button>
              <button type="button" class="cr-write-tool-btn" title="音频"><svg class="cr-w-svg"><use href="#cr-ic-audio"/></svg>音频</button>
              <button type="button" class="cr-write-tool-btn" title="图集"><svg class="cr-w-svg"><use href="#cr-ic-layers"/></svg>图集</button>
              <button type="button" class="cr-write-tool-btn" title="视频卡"><svg class="cr-w-svg"><use href="#cr-ic-clapper"/></svg>视频卡</button>
              <button type="button" class="cr-write-tool-btn" title="附件"><svg class="cr-w-svg"><use href="#cr-ic-paperclip"/></svg>附件</button>
              <button type="button" class="cr-write-tool-btn" title="习题"><svg class="cr-w-svg"><use href="#cr-ic-help"/></svg>习题</button>
              <button type="button" class="cr-write-tool-btn" title="网页"><svg class="cr-w-svg"><use href="#cr-ic-globe"/></svg>网页</button>
              <button type="button" class="cr-write-tool-btn" title="实训"><svg class="cr-w-svg"><use href="#cr-ic-wrench"/></svg>实训</button>
              <button type="button" class="cr-write-tool-btn" title="矩形"><svg class="cr-w-svg"><use href="#cr-ic-square"/></svg>矩形</button>
              <button type="button" class="cr-write-tool-btn" title="背景图"><svg class="cr-w-svg"><use href="#cr-ic-image-up"/></svg>背景图</button>
              <button type="button" class="cr-write-tool-btn" title="案例"><svg class="cr-w-svg"><use href="#cr-ic-book"/></svg>案例</button>
            </div>
          </div>
          <div class="cr-write-editor-pad">
            <div class="cr-write-editor" id="writeEditor" contenteditable="true" spellcheck="false" data-placeholder="在此撰写正文…（演示占位，可接入富文本引擎）"></div>
          </div>
        </section>

        <aside class="cr-write-rail is-collapsed" id="writeRailAside" aria-label="审核与版本侧栏">
          <button type="button" class="cr-write-rail-handle" id="writeRailToggle" aria-expanded="false" aria-controls="writeRailPanel" title="展开侧栏（审核意见 / 版本记录）">
            <svg class="cr-w-svg cr-write-rail-handle-ic" aria-hidden="true"><use href="#cr-ic-chevron-left"/></svg>
            <span class="cr-write-rail-handle-hint">审核</span>
          </button>
          <div class="cr-write-rail-panel" id="writeRailPanel" aria-hidden="true">
            <div class="cr-write-tabs" role="tablist">
              <button type="button" class="cr-write-tab is-active" role="tab" aria-selected="true" data-write-tab="audit">审核意见</button>
              <button type="button" class="cr-write-tab" role="tab" aria-selected="false" data-write-tab="version">版本记录</button>
            </div>
            <div class="cr-write-rail-body" id="writeRailAudit">
              <div class="cr-write-empty" id="writeAuditEmpty">
                <svg class="cr-write-empty-illus" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <path d="M14 2v6h6"/>
                  <path d="M9 13h6M9 17h6"/>
                </svg>
                <span>暂无数据</span>
              </div>
            </div>
            <div class="cr-write-rail-body" id="writeRailVersion" hidden style="display:none">
              <div class="cr-write-empty">
                <svg class="cr-write-empty-illus" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
                <span>暂无版本记录（演示）</span>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </div>
  <script src="./write.js"></script>
</body>
</html>
